<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Carta QR | La Trattoria</title>

  <link rel="stylesheet" href="css/reset.css"/>
  <link rel="stylesheet" href="css/styles.css"/>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <!-- HEADER -->

  <header class="header">
    <div class="container">

      <div class="logo">🍝</div>

      <h1 class="restaurant-name">
        La Trattoria
      </h1>

      <div class="restaurant-info">
        Granada · Cocina italiana · Desde 2018
      </div>

    </div>
  </header>

  <!-- PIZZAS -->

  <section class="category">
    <div class="container">

      <h2 class="category-title">
        Pizzas
      </h2>

      <div class="menu-list">

        <div class="menu-item">

          <div class="menu-item-info">
            <h3>Margarita</h3>
            <p>
              Tomate, mozzarella y albahaca fresca
            </p>
          </div>

          <div class="price">
            10€
          </div>

        </div>

        <div class="menu-item">

          <div class="menu-item-info">
            <h3>4 Formaggi</h3>
            <p>
              Mezcla de quesos italianos
            </p>
          </div>

          <div class="price">
            13€
          </div>

        </div>

      </div>

    </div>
  </section>

  <!-- PASTA -->

  <section class="category">
    <div class="container">

      <h2 class="category-title">
        Pasta
      </h2>

      <div class="menu-list">

        <div class="menu-item">

          <div class="menu-item-info">
            <h3>Carbonara</h3>
            <p>
              Huevo, panceta y pecorino
            </p>
          </div>

          <div class="price">
            12€
          </div>

        </div>

      </div>

    </div>
  </section>

  <!-- FOOTER -->

  <footer class="footer">
    © 2026 La Trattoria
  </footer>

  <!-- WHATSAPP -->

  <a href="https://wa.me/34600000000"
     class="whatsapp-float">

    <i class="fa-brands fa-whatsapp"></i>

  </a>

</body>
</html>
